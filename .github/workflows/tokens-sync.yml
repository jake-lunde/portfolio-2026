name: Tokens sync

# On any PR that edits tokens/**, regenerate the committed
# src/styles/tokens.generated.css from the token source and push it back to
# the PR branch. Keeps the generated CSS honest without asking a human (or the
# Figma plugin) to run Style Dictionary. The Chromatic workflow's freshness
# guard is the backstop if this ever fails to run.

on:
  pull_request:
    paths:
      - 'tokens/**'

# Allow committing back to the PR branch.
permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    # Skip runs triggered by our own auto-commit to avoid an infinite loop.
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR branch head (not the merge ref) so we can push to it.
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # match local (22.16)

      - run: npm ci

      - name: Rebuild tokens.generated.css
        run: npm run tokens:build

      - name: Commit regenerated artifacts if they changed
        # tokens:build emits the CSS and src/lib/motion.generated.ts (springs
        # consumed by motion/react). Stage only artifacts that EXIST: a PR
        # branch whose tree predates a given artifact runs that older build
        # script and never emits it — `git add` on a missing path is fatal and
        # would fail the regen (this bit us on PR #3). Staging first also
        # catches brand-new untracked artifacts, which `git diff` alone misses.
        run: |
          for f in src/styles/tokens.generated.css src/lib/motion.generated.ts; do
            [ -f "$f" ] && git add -- "$f"
          done
          if git diff --cached --quiet; then
            echo "generated artifacts already fresh — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "ci: regenerate token artifacts"
            git push origin HEAD:${{ github.head_ref }}
          fi
